name: Build Java Files
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build Java Files
        run: |
          find . -name "build.gradle" | while read f; do
            dir=$(dirname "$f")
            cd "$dir"
            if [ -f "./gradlew" ]; then
              chmod +x ./gradlew
              ./gradlew build
            else
              gradle build
            fi
            cd $GITHUB_WORKSPACE
          done
          find . -name "pom.xml" | while read f; do
            cd $(dirname "$f")
            mvn package -q
            cd $GITHUB_WORKSPACE
          done