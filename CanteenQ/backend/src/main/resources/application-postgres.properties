spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/canteenq}
spring.datasource.username=${POSTGRES_USERNAME:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:valyrian}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
app.bootstrap.enabled=false

# Firebase Admin configuration (enable to verify real Firebase ID tokens)
# Set to true to load Firebase Admin credentials and enable token verification
firebase.admin.enabled=true
# Path to service account JSON file (optional)
firebase.admin.credentials-path=
# Or provide raw JSON (or base64-encoded JSON) directly
firebase.admin.credentials-json=
# Optional: restrict accepted student email domain (e.g. school.edu)
firebase.admin.allowed-email-domain=students.nu-laguna.edu.ph
