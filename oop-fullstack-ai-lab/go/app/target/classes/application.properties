spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gogrowglow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
server.port=8080

# If you don't have PostgreSQL available yet, set this environment variable to use H2:
# SPRING_DATASOURCE_URL=jdbc:h2:mem:gogrowglow;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
